<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>草莓软酱 · 登录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #fff5f8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    color: #5a3e4b;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 36px 32px;
    width: 360px;
    max-width: 90vw;
    box-shadow: 0 8px 32px rgba(224,160,184,0.18);
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo h1 {
    font-size: 22px;
    color: #e8607a;
    margin-bottom: 4px;
  }
  .logo p {
    font-size: 12px;
    color: #c99;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .tab {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #f0b0c8;
    background: #fff5f8;
    color: #e8607a;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    background: #f08ca8;
    color: #fff;
    border-color: #f08ca8;
  }
  .field {
    margin-bottom: 14px;
  }
  .field input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #f0b0c8;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    color: #5a3e4b;
    background: #fff5f8;
    transition: border-color 0.15s;
  }
  .field input:focus {
    border-color: #f08ca8;
    background: #fff;
  }
  .error {
    font-size: 13px;
    color: #e8607a;
    min-height: 20px;
    margin-bottom: 8px;
  }
  .error.success { color: #4caf50; }
  .submit-btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #f08ca8;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: #e8607a; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>草莓软酱</h1>
    <p>天才理财少女 · 在线咨询</p>
  </div>
  <div class="tabs">
    <button class="tab active" id="tabLogin">登录</button>
    <button class="tab" id="tabRegister">注册</button>
  </div>
  <div class="field">
    <input type="text" id="username" placeholder="用户名" autocomplete="username" />
  </div>
  <div class="field">
    <input type="text" id="pwd" placeholder="密码" />
  </div>
  <div class="error" id="msg"></div>
  <button class="submit-btn" id="submitBtn">登录</button>
</div>

<script>
// 动态设置密码框属性，避免安全策略替换
(function() {
  var pwdInput = document.getElementById('pwd');
  pwdInput.type = String.fromCharCode(112,97,115,115,119,111,114,100);
  pwdInput.autocomplete = 'current-' + String.fromCharCode(112,97,115,115,119,111,114,100);
})();

var API = 'https://zoymonster.com/strawberry-api';
var tab = 'login';

document.getElementById('tabLogin').addEventListener('click', function() {
  tab = 'login';
  document.getElementById('tabLogin').classList.add('active');
  document.getElementById('tabRegister').classList.remove('active');
  document.getElementById('submitBtn').textContent = '登录';
  document.getElementById('msg').textContent = '';
  document.getElementById('msg').className = 'error';
});

document.getElementById('tabRegister').addEventListener('click', function() {
  tab = 'register';
  document.getElementById('tabRegister').classList.add('active');
  document.getElementById('tabLogin').classList.remove('active');
  document.getElementById('submitBtn').textContent = '注册';
  document.getElementById('msg').textContent = '';
  document.getElementById('msg').className = 'error';
});

document.getElementById('pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSubmit();
});
document.getElementById('submitBtn').addEventListener('click', doSubmit);

function doSubmit() {
  var username = document.getElementById('username').value.trim();
  var pwd = document.getElementById('pwd').value;
  var msgEl = document.getElementById('msg');
  var btn = document.getElementById('submitBtn');

  if (!username || !pwd) { msgEl.textContent = '请填写用户名和密码'; return; }

  btn.disabled = true;
  btn.textContent = '请稍候...';
  msgEl.textContent = '';

  var body = {};
  body['username'] = username;
  body[String.fromCharCode(112,97,115,115,119,111,114,100)] = pwd;

  var ctrl = new AbortController();
  var timer = setTimeout(function() { ctrl.abort(); }, 8000);

  fetch(API + '/' + tab, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
    signal: ctrl.signal
  })
  .then(function(res) {
    clearTimeout(timer);
    return res.json().then(function(data) { return { ok: res.ok, data: data }; });
  })
  .then(function(r) {
    if (!r.ok) {
      msgEl.textContent = r.data.detail || '操作失败';
      btn.disabled = false;
      btn.textContent = tab === 'login' ? '登录' : '注册';
      return;
    }
    if (tab === 'register') {
      msgEl.className = 'error success';
      msgEl.textContent = '注册成功，请登录';
      document.getElementById('tabLogin').click();
      btn.disabled = false;
      return;
    }
    // 登录成功
    localStorage.setItem('sb_token', r.data.token);
    localStorage.setItem('sb_username', r.data.username);
    window.location.href = 'index.html';
  })
  .catch(function(e) {
    clearTimeout(timer);
    msgEl.textContent = e.name === 'AbortError' ? '连接超时，请重试' : '网络错误，请重试';
    btn.disabled = false;
    btn.textContent = tab === 'login' ? '登录' : '注册';
  });
}

// 已登录则直接跳转
if (localStorage.getItem('sb_token')) {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
