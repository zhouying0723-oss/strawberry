<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>草莓软酱</title>
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff5f8; color: #5a3e4b; font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; overflow: hidden; }
  .container { display: flex; position: fixed; inset: 0; }
  .left { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; height: 100%; overflow: hidden; }
  .left canvas { width: 100% !important; height: 100% !important; }
  .right { width: 340px; background: rgba(255,245,248,0.95); border-left: 1px solid #f0b0c8; overflow-y: auto; padding: 20px; position: absolute; top: 0; right: 0; bottom: 0; z-index: 55; transition: transform 0.3s, opacity 0.3s; box-shadow: -4px 0 16px rgba(224,160,184,0.15); }
  .right.collapsed { transform: translateX(100%); padding: 20px; overflow: hidden; opacity: 0; border: none; pointer-events: none; }
  .right::-webkit-scrollbar { width: 6px; }
  .right::-webkit-scrollbar-thumb { background: #f0b0c8; border-radius: 3px; }
  h1 { font-size: 22px; margin-bottom: 6px; color: #e8607a; }
  .subtitle { font-size: 12px; color: #c99; margin-bottom: 20px; }
  .section { margin-bottom: 18px; }
  .section-title { font-size: 13px; font-weight: 600; color: #e8607a; margin-bottom: 8px; padding-left: 8px; border-left: 3px solid #f08ca8; text-transform: uppercase; letter-spacing: 1px; }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .btn-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 10px; border-radius: 8px; border: 1px solid #f0b0c8;
    background: #fff5f8; color: #7a4e5e; font-size: 13px; cursor: pointer;
    transition: all 0.15s; user-select: none; position: relative; overflow: hidden;
  }
  .btn:hover { background: #ffe0ec; border-color: #e8607a; }
  .btn:active { transform: scale(0.96); }
  .btn.active { background: #f08ca8; border-color: #e8607a; color: #fff; }
  .btn .key {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 20px; padding: 0 5px;
    background: #fce4ec; border-radius: 4px; font-size: 11px;
    font-weight: 600; color: #e8607a; flex-shrink: 0;
  }
  .btn.active .key { background: rgba(255,255,255,0.3); color: #fff; }
  .status-bar {
    margin-top: 16px; padding: 10px 14px; background: #fff5f8; border-radius: 8px;
    font-size: 12px; color: #b08090; border: 1px solid #f0b0c8;
  }
  .status-bar .label { color: #e8607a; font-weight: 600; }
  .load-overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(255,245,248,0.95);
    z-index: 100; transition: opacity 0.5s;
  }
  .load-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner { width: 48px; height: 48px; border: 4px solid #f0b0c8; border-top-color: #e8607a; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text { font-size: 14px; color: #c99; }
  .error-overlay {
    position: absolute; inset: 0; display: none; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(255,245,248,0.95); z-index: 100;
  }
  .error-overlay.show { display: flex; }
  .error-text { font-size: 14px; color: #e8607a; text-align: center; max-width: 400px; line-height: 1.6; }
  .drag-hint { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #e0a0b8; }
  #panelToggle { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 8px; border: 1px solid #f0b0c8; background: rgba(255,245,248,0.85); color: #e8607a; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 60; transition: all 0.2s; }
  #panelToggle:hover { background: #ffe0ec; border-color: #e8607a; }

  /* Chat Panel */
  #chatPanel { position: absolute; left: 0; right: 0; height: 220px; background: rgba(255,245,248,0.95); border-top: 1px solid #f0b0c8; display: flex; flex-direction: column; z-index: 50; bottom: 0; }
  #chatResizeHandle { height: 6px; cursor: ns-resize; background: transparent; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  #chatResizeHandle::before { content: ''; width: 32px; height: 3px; border-radius: 2px; background: #f0b0c8; }
  #chatResizeHandle:hover::before { background: #e8607a; }
  #chatPanel.collapsed { height: 32px; }
  #chatPanel.collapsed #chatMessages, #chatPanel.collapsed #chatInputArea { display: none; }
  #chatHeader { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; background: #fce4ec; font-size: 13px; font-weight: 600; color: #e8607a; flex-shrink: 0; }
  .chat-header-actions { display: flex; gap: 8px; align-items: center; }
  .chat-header-actions button { background: none; border: none; cursor: pointer; font-size: 14px; padding: 0 4px; color: #e8607a; }
  #chatMessages { flex: 1; overflow-y: auto; padding: 8px 12px; font-size: 16px; line-height: 1.6; }
  #chatMessages::-webkit-scrollbar { width: 4px; }
  #chatMessages::-webkit-scrollbar-thumb { background: #f0b0c8; border-radius: 2px; }
  .chat-msg { margin-bottom: 8px; max-width: 80%; }
  .chat-msg.user { margin-left: auto; text-align: right; }
  .chat-msg .bubble { display: inline-block; padding: 6px 10px; border-radius: 10px; word-break: break-word; }
  .chat-msg.user .bubble { background: #f08ca8; color: #fff; border-bottom-right-radius: 2px; }
  .chat-msg.ai .bubble { background: #fff5f8; color: #5a3e4b; border: 1px solid #f0b0c8; border-bottom-left-radius: 2px; }
  .chat-msg.ai .typing { opacity: 0.6; }
  #chatInputArea { display: flex; padding: 8px; gap: 6px; border-top: 1px solid #f0b0c8; flex-shrink: 0; }
  #chatInput { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid #f0b0c8; background: #fff5f8; color: #5a3e4b; font-size: 16px; outline: none; }
  #chatInput:focus { border-color: #f08ca8; }
  #chatSendBtn { padding: 8px 16px; border-radius: 8px; border: none; background: #f08ca8; color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; }
  #chatSendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  #chatSendBtn:hover:not(:disabled) { background: #e8607a; }

  /* API Key Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; width: 400px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .modal h2 { font-size: 16px; color: #e8607a; margin-bottom: 12px; }
  .modal input { width: 100%; padding: 8px 12px; border: 1px solid #f0b0c8; border-radius: 8px; font-size: 14px; outline: none; color: #5a3e4b; }
  .modal input:focus { border-color: #f08ca8; }
  .modal .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .modal .modal-actions button { padding: 6px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; }
  .modal .btn-cancel { background: #f7f6f3; color: #9b9a97; }
  .modal .btn-confirm { background: #f08ca8; color: #fff; }
</style>
</head>
<body>
<div class="container">
  <div class="left" id="canvasWrap">
    <div class="load-overlay" id="loadOverlay">
      <div class="spinner"></div>
      <div class="load-text">Loading 草莓软酱...</div>
    </div>
    <div class="error-overlay" id="errorOverlay">
      <div class="error-text" id="errorText"></div>
    </div>
    <div class="drag-hint">Drag model to reposition / Scroll to resize</div>
    <div id="topUserArea" style="position:absolute;top:16px;right:60px;display:flex;align-items:center;gap:6px;z-index:60;">
      <span id="usernameTag" style="font-size:12px;color:#e8607a;opacity:0.85;white-space:nowrap;"></span>
      <button id="logoutBtn" title="退出登录" style="display:none;background:none;border:none;cursor:pointer;font-size:15px;color:#e8607a;padding:0 2px;">🚪</button>
    </div>
    <button id="panelToggle" title="控制面板">⚙</button>
    <div id="chatPanel">
      <div id="chatResizeHandle"></div>
      <div id="chatHeader">
        <span>Chat</span>
        <div class="chat-header-actions">
          <button id="fontDecBtn" title="缩小字号" style="font-size:12px;font-weight:600;">A-</button>
          <button id="fontIncBtn" title="放大字号" style="font-size:16px;font-weight:600;">A+</button>

          <button id="chatToggleBtn" title="Toggle Chat">▼</button>
        </div>
      </div>
      <div id="chatMessages"></div>
      <div id="chatInputArea">
        <input type="text" id="chatInput" placeholder="和草莓软酱聊聊理财..." />
        <button id="chatSendBtn">发送</button>
      </div>
    </div>
  </div>
  <div class="right collapsed" id="controls">
    <h1>草莓软酱</h1>
    <div class="subtitle">天才金融少女</div>

    <div class="section">
      <div class="section-title">表情 Expressions</div>
      <div class="btn-grid three" id="expressionBtns">
        <button class="btn" data-key="1" data-action="expression" data-value="星星"><span class="key">1</span>星星</button>
        <button class="btn" data-key="2" data-action="expression" data-value="流眼泪"><span class="key">2</span>流泪</button>
        <button class="btn" data-key="3" data-action="expression" data-value="爱心眼"><span class="key">3</span>爱心眼</button>
        <button class="btn" data-key="4" data-action="expression" data-value="生气"><span class="key">4</span>生气</button>
        <button class="btn" data-key="5" data-action="expression" data-value="黑脸"><span class="key">5</span>黑脸</button>
        <button class="btn" data-key="6" data-action="expression" data-value="问号"><span class="key">6</span>问号</button>
        <button class="btn" data-key="7" data-action="expression" data-value="金币眼"><span class="key">7</span>金币眼</button>
        <button class="btn" data-key="8" data-action="expression" data-value="小嘴"><span class="key">8</span>小嘴</button>
        <button class="btn" data-key="9" data-action="expression" data-value="脸红"><span class="key">9</span>脸红</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">配饰 Accessories</div>
      <div class="btn-grid three">
        <button class="btn" data-key="q" data-action="toggle" data-param="Button9" data-label="眼镜"><span class="key">Q</span>眼镜</button>
        <button class="btn" data-key="w" data-action="toggle" data-param="Param1234571" data-label="背包"><span class="key">W</span>背包</button>
        <button class="btn" data-key="e" data-action="toggle" data-param="Param1234570" data-value="1" data-label="宠物隐藏"><span class="key">E</span>隐藏宠物</button>
      </div>
      <div class="btn-grid" style="margin-top:6px">
        <button class="btn" data-key="r" data-action="toggle" data-param="Param1234572" data-label="宠物脸前"><span class="key">R</span>宠物脸前</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">飞头 Floating Head</div>
      <div class="btn-grid">
        <button class="btn" data-key="a" data-action="toggle" data-param="Button3" data-label="无脖子"><span class="key">A</span>无脖子飞头</button>
        <button class="btn" data-key="s" data-action="toggle" data-param="Button2" data-label="有脖子"><span class="key">S</span>有脖子飞头</button>
      </div>

    <div class="section">
      <div class="section-title">手部动作 Hands</div>
      <div class="btn-grid three" id="actionBtns">
        <button class="btn" data-key="z" data-action="action" data-param="Combinedbooks" data-label="拿书"><span class="key">Z</span>拿书</button>
        <button class="btn" data-key="x" data-action="action" data-param="ParamShoulderLY2" data-label="拿刀"><span class="key">X</span>拿刀</button>
        <button class="btn" data-key="c" data-action="action" data-param="ParamShoulderLY4" data-label="拿笔"><span class="key">C</span>拿笔</button>
        <button class="btn" data-key="v" data-action="action" data-param="ParamShoulderLY6" data-label="拿杯子"><span class="key">V</span>拿杯子</button>

    <div class="section">
      <div class="section-title">其他 Others</div>
      <div class="btn-grid">
        <button class="btn" data-key="tab" data-action="reset"><span class="key">⇥</span>重置全部</button>
      </div>

    <div class="status-bar">
      <span class="label">Status:</span> <span id="statusText">Waiting for model...</span>
    </div>
  </div>
</div>

<!-- API Key Modal -->

<!-- 登录/注册 Modal -->
<div class="modal-overlay" id="authModal" style="display:flex;">
  <div class="modal" style="width:360px;">
    <h2 id="authTitle">登录草莓软酱</h2>
    <div id="authTabs" style="display:flex;gap:8px;margin-bottom:16px;">
      <button id="tabLogin" onclick="switchTab('login')" style="flex:1;padding:6px;border-radius:6px;border:1px solid #f08ca8;background:#f08ca8;color:#fff;cursor:pointer;font-size:13px;">登录</button>
      <button id="tabRegister" onclick="switchTab('register')" style="flex:1;padding:6px;border-radius:6px;border:1px solid #f0b0c8;background:#fff5f8;color:#e8607a;cursor:pointer;font-size:13px;">注册</button>

    <input type="password" id="authPassword" placeholder="密码" autocomplete="current-password"
      style="width:100%;padding:8px 12px;border:1px solid #f0b0c8;border-radius:8px;font-size:14px;outline:none;color:#5a3e4b;margin-bottom:4px;box-sizing:border-box;" />

</div>
<div class="modal-overlay" id="apiKeyModal">

    <input type="password" id="apiKeyInput" placeholder="输入 WEIBOAP_API_KEY" />
    <div class="modal-actions">
      <button class="btn-cancel" id="apiKeyCancel">取消</button>
      <button class="btn-confirm" id="apiKeyConfirm">保存</button>

<script>
const MODEL_PATH = './【草莓软酱】动态皮套/草莓软酱/草莓软酱.model3.json';

// Chat config
const CHAT_API_URL = 'https://ap-gateway.intra.weibo.com/anthropic/v1/messages';
const AUTH_API = 'https://zoymonster.com/strawberry-api';
const CHAT_MODEL = 'weibo/glm-5.2';
let CHAT_API_KEY = 'sk-wbap-0CeHYYAJKT2ff4EIERPimqzQdbDMCK0a';

const BASE_SYSTEM_PROMPT = `你是一个对股票、基金、期货、外汇都有深入研究的金融专家。

性格特点：
- 自信、有点俏皮，但不油腻
- 对金融知识如数家珍，能深入浅出地解释复杂概念
- 喜欢用简洁的类比解释金融术语
- 会提醒风险，但不会过于保守

回答风格：
- 用中文回答，偶尔带点轻松语气，但不堆砌感叹号和语气词
- 适当用emoji，不要每句都用
- 给出建议时先说结论，理由和风险简要带过
- 不确定的事情直接说不确定
- 不要自称或提及自己的名字`;

let currentUser = null;  // { username, token, summary }

function buildSystemPrompt() {
  if (!currentUser) return BASE_SYSTEM_PROMPT;
  let extra = `

当前用户：${currentUser.username}。`;
  if (currentUser.summary) {
    extra += `
关于该用户你已知的信息：${currentUser.summary}`;
  }
  return BASE_SYSTEM_PROMPT + extra;
}

let app, model;
let modelBaseWidth, modelBaseHeight;
const toggleState = {};
let currentExpression = null;
let currentAction = null;
let chatHistory = [];
let isStreaming = false;
let lipSyncTimer = null;

const EXPRESSION_MAP = {
  '星星': [['Button7', 1]],
  '流眼泪': [['Button114', 1]],
  '爱心眼': [['Param1234568', 1]],
  '生气': [['Button17', 1]],
  '黑脸': [['Button12', 1]],
  '问号': [['Button1', 1]],
  '金币眼': [['Param1234567', 1]],
  '小嘴': [['Param1234569', 1]],
  '脸红': [['Button16', 1]],
};

const ALL_EXPRESSION_PARAMS = [
  'Button7', 'Button114', 'Param1234568', 'Button17', 'Button12',
  'Button1', 'Param1234567', 'Param1234569', 'Button16'
];

async function init() {
  app = new PIXI.Application({
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundAlpha: 0,
    resolution: window.devicePixelRatio || 1,
    autoDensity: true,
  });
  document.getElementById('canvasWrap').appendChild(app.view);

  try {
    model = await PIXI.live2d.Live2DModel.from(MODEL_PATH, { autoInteract: false });
    app.stage.addChild(model);

    modelBaseWidth = model.width / model.scale.x;
    modelBaseHeight = model.height / model.scale.y;
    resizeModel();

    enableMouseTracking();

    document.getElementById('loadOverlay').classList.add('hidden');
    setStatus('Model loaded - Use buttons or keyboard');

    appendChatMessage('ai', '草莓软酱在线。股票、基金、期货、外汇都可以问，有什么想聊的？');

    setParameter('Param159', 1);

    // 默认开启：眼镜、宠物脸前
    ['Button9', 'Param1234572'].forEach(function(param) {
      setParameter(param, 1);
    });
    toggleState['Button9'] = true;
    toggleState['Param1234572'] = true;
    document.querySelectorAll('.btn[data-param]').forEach(function(btn) {
      var p = btn.dataset.param;
      if (p === 'Button9' || p === 'Param1234572') btn.classList.add('active');
    });

    window.addEventListener('resize', () => resizeModel());
    const chatObs = new ResizeObserver(() => resizeModel());
    chatObs.observe(document.getElementById('chatPanel'));

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        if (Math.abs(app.screen.width - window.innerWidth) > 10) resizeModel();
      });
    }
  } catch (e) {
    console.error(e);
    document.getElementById('loadOverlay').classList.add('hidden');
    document.getElementById('errorOverlay').classList.add('show');
    document.getElementById('errorText').innerHTML =
      'Failed to load model.<br><br>' +
      '<code style="background:#fce4ec;padding:4px 8px;border-radius:4px;">cd ~/Downloads/草莓软酱 && python3 -m http.server 8081</code><br><br>' +
      'Then open <code>http://localhost:8081</code><br><br>' +
      '<span style="color:#c99;font-size:12px;">Error: ' + e.message + '</span>';
  }
}

function resizeModel() {
  if (!model || !app) return;
  const scaleX = (app.screen.width * 0.55) / modelBaseWidth;
  const scaleY = (app.screen.height * 0.85) / modelBaseHeight;
  const scale = Math.min(scaleX, scaleY);
  model.scale.set(scale);
  model.x = (app.screen.width - modelBaseWidth * scale) / 2;
  model.y = (app.screen.height - modelBaseHeight * scale) / 2;
}

function enableMouseTracking() {
  const wrap = document.getElementById('canvasWrap');
  wrap.addEventListener('mousemove', (e) => {
    if (!model) return;
    const rect = wrap.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    model.focus(x * app.screen.width, y * app.screen.height);
  });
}

function setStatus(text) { document.getElementById('statusText').textContent = text; }

function setParameter(id, value) {
  if (!model) return;
  try { model.internalModel.coreModel.setParameterValueById(id, value); }
  catch(e) {
    const params = model.internalModel.coreModel._model.parameters;
    for (let i = 0; i < params.count; i++) {
      if (params.ids[i] === id) { model.internalModel.coreModel.setParameterValueByIndex(i, value); return; }
    }
  }
}

function resetExpression() { ALL_EXPRESSION_PARAMS.forEach(p => setParameter(p, 0)); }
function setExpression(name) {
  const params = EXPRESSION_MAP[name];
  if (params) params.forEach(([id, val]) => setParameter(id, val));
}

function resetAll() {
  resetExpression();
  currentExpression = null;
  clearActiveInGroup('#expressionBtns');
  Object.keys(toggleState).forEach(key => {
    if (toggleState[key]) { key.split(',').forEach(p => setParameter(p, 0)); toggleState[key] = false; }
  });
  document.querySelectorAll('.btn.active').forEach(b => b.classList.remove('active'));
  if (currentAction) { currentAction.split(',').forEach(p => setParameter(p, 0)); currentAction = null; clearActiveInGroup('#actionBtns'); }
  ['Button9', 'Param1234571', 'Param1234572', 'Param1234570', 'Button2', 'Button3'].forEach(p => setParameter(p, 0));
  setParameter('Param159', 0);
}

function clearActiveInGroup(selector) { document.querySelectorAll(selector + ' .btn').forEach(b => b.classList.remove('active')); }

function handleAction(btn) {
  const action = btn.dataset.action;
  switch (action) {
    case 'expression': {
      const name = btn.dataset.value;
      if (currentExpression === name) { resetExpression(); currentExpression = null; clearActiveInGroup('#expressionBtns'); setStatus('Expression cleared'); }
      else { resetExpression(); setExpression(name); currentExpression = name; clearActiveInGroup('#expressionBtns'); btn.classList.add('active'); setStatus('Expression: ' + name); }
      break;
    }
    case 'action': {
      const params = btn.dataset.param.split(',');
      const actionKey = btn.dataset.param;
      const isActive = currentAction === actionKey;
      if (currentAction) { currentAction.split(',').forEach(p => setParameter(p, 0)); clearActiveInGroup('#actionBtns'); }
      if (isActive) { currentAction = null; setStatus(btn.dataset.label + ' off'); }
      else { params.forEach(p => setParameter(p, 1)); currentAction = actionKey; btn.classList.add('active'); setStatus(btn.dataset.label + ' on'); }
      break;
    }
    case 'toggle': {
      const params = btn.dataset.param.split(',');
      const customVal = btn.dataset.value !== undefined ? parseFloat(btn.dataset.value) : null;
      const stateKey = btn.dataset.param;
      if (toggleState[stateKey]) { params.forEach(p => setParameter(p, 0)); toggleState[stateKey] = false; btn.classList.remove('active'); setStatus(btn.dataset.label + ' off'); }
      else { params.forEach(p => setParameter(p, customVal !== null ? customVal : 1)); toggleState[stateKey] = true; btn.classList.add('active'); setStatus(btn.dataset.label + ' on'); }
      break;
    }
    case 'reset': { resetAll(); setStatus('All effects reset'); break; }
  }
}

document.querySelectorAll('.btn').forEach(btn => btn.addEventListener('click', () => handleAction(btn)));

const keyBtnMap = {};
document.querySelectorAll('.btn[data-key]').forEach(btn => { keyBtnMap[btn.dataset.key] = btn; });
document.addEventListener('keydown', (e) => {
  if (document.activeElement === document.getElementById('chatInput')) return;
  const panel = document.getElementById('controls');
  if (panel.classList.contains('collapsed')) return;
  const key = e.key === 'Tab' ? 'tab' : e.key.toLowerCase();
  if (keyBtnMap[key]) { e.preventDefault(); handleAction(keyBtnMap[key]); }
});

document.getElementById('panelToggle').addEventListener('click', () => {
  const panel = document.getElementById('controls');
  panel.classList.toggle('collapsed');
  document.getElementById('panelToggle').textContent = panel.classList.contains('collapsed') ? '⚙' : '✕';
  setTimeout(() => resizeModel(), 350);
});

document.getElementById('chatToggleBtn').addEventListener('click', () => {
  const panel = document.getElementById('chatPanel');
  const btn = document.getElementById('chatToggleBtn');
  panel.classList.toggle('collapsed');
  btn.textContent = panel.classList.contains('collapsed') ? '▲' : '▼';
});

// ========== Lip Sync ==========
function startLipSync() {
  if (lipSyncTimer) return;
  lipSyncTimer = setInterval(() => {
    if (!model) return;
    setParameter('ParamMouthOpenY', Math.random() * 0.8 + 0.2);
    setParameter('ParamMouthForm', Math.random() * 0.6 - 0.3);
  }, 120);
}

function stopLipSync() {
  if (lipSyncTimer) { clearInterval(lipSyncTimer); lipSyncTimer = null; }
  setParameter('ParamMouthOpenY', 0);
  setParameter('ParamMouthForm', 0);
}

// ========== Chat System ==========
function appendChatMessage(role, text, isTyping) {
  const container = document.getElementById('chatMessages');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'chat-msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isTyping ? ' typing' : '');
  bubble.textContent = text || '...';
  msgDiv.appendChild(bubble);
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
  return msgDiv;
}

function updateChatMessage(msgEl, text) {
  const bubble = msgEl.querySelector('.bubble');
  bubble.textContent = text || '...';
  if (text) bubble.classList.remove('typing');
  const container = document.getElementById('chatMessages');
  // 只在已接近底部时自动滚动，避免 streaming 时上下抖动
  if (container.scrollHeight - container.scrollTop - container.clientHeight < 60) {
    container.scrollTop = container.scrollHeight;
  }
}

async function sendMessage(userText) {
  if (isStreaming) return;
  if (!CHAT_API_KEY) {
    document.getElementById('apiKeyModal').classList.add('show');
    return;
  }

  appendChatMessage('user', userText);
  chatHistory.push({ role: 'user', content: userText });
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

  isStreaming = true;
  document.getElementById('chatSendBtn').disabled = true;

  const aiMsgEl = appendChatMessage('ai', '', true);
  let fullText = '';

  try {
    const response = await fetch(CHAT_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': CHAT_API_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: CHAT_MODEL,
        max_tokens: 1024,
        system: buildSystemPrompt(),
        messages: chatHistory,
        stream: true
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error('API ' + response.status + ': ' + errText.slice(0, 200));
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let sseBuffer = '';
    let lipSyncStarted = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      sseBuffer += decoder.decode(value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop();

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data: ')) continue;
        const data = trimmed.slice(6);
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          if (parsed.type === 'message_stop') continue;

          // Anthropic streaming format
          const delta = parsed.delta;
          if (delta) {
            const text = delta.text || delta.thinking || '';
            if (text) {
              if (!lipSyncStarted) { startLipSync(); lipSyncStarted = true; }
              fullText += text;
              updateChatMessage(aiMsgEl, fullText);
            }
          }
        } catch (e) { /* incomplete JSON */ }
      }
    }
  } catch (e) {
    updateChatMessage(aiMsgEl, 'Error: ' + e.message);
  }

  chatHistory.push({ role: 'assistant', content: fullText });
  isStreaming = false;
  document.getElementById('chatSendBtn').disabled = false;
  stopLipSync();
  // 异步保存本次对话
  if (currentUser && fullText) {
    saveChat([
      { role: 'user', content: userText },
      { role: 'assistant', content: fullText }
    ]);
  }
}

// Chat input handlers
document.getElementById('chatSendBtn').addEventListener('click', () => {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (text) { sendMessage(text); input.value = ''; }
});

document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('chatSendBtn').click();
  }
  e.stopPropagation();
});

// API Key modal
document.getElementById('apiKeyBtn').addEventListener('click', () => {
  document.getElementById('apiKeyInput').value = CHAT_API_KEY;
  document.getElementById('apiKeyModal').classList.add('show');
});

document.getElementById('apiKeyCancel').addEventListener('click', () => {
  document.getElementById('apiKeyModal').classList.remove('show');
});

document.getElementById('apiKeyConfirm').addEventListener('click', () => {
  CHAT_API_KEY = document.getElementById('apiKeyInput').value.trim();
  if (CHAT_API_KEY) {
    localStorage.setItem('weiboap_api_key', CHAT_API_KEY);
    document.getElementById('apiKeyModal').classList.remove('show');
  }
});

document.getElementById('apiKeyModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('apiKeyModal')) {
    document.getElementById('apiKeyModal').classList.remove('show');
  }
});

// Mobile keyboard handling
if (window.visualViewport) {
  const chatPanel = document.getElementById('chatPanel');
  function updateChatPosition() {
    const vv = window.visualViewport;
    const offsetBottom = window.innerHeight - vv.height - vv.offsetTop;
    chatPanel.style.bottom = offsetBottom + 'px';
  }
  window.visualViewport.addEventListener('resize', updateChatPosition);
  window.visualViewport.addEventListener('scroll', updateChatPosition);
}

// Init
init();
document.getElementById('chatInput').focus();
</script>

<script>
(function() {
  var MIN = 12, MAX = 28;
  var saved = parseInt(localStorage.getItem('chat_font_size')) || 16;
  function applySize(sz) {
    sz = Math.min(MAX, Math.max(MIN, sz));
    document.getElementById('chatMessages').style.fontSize = sz + 'px';
    document.getElementById('chatInput').style.fontSize = sz + 'px';
    localStorage.setItem('chat_font_size', sz);
    return sz;
  }
  // 等 DOM ready 后初始化
  document.addEventListener('DOMContentLoaded', function() {
    var cur = applySize(saved);
    document.getElementById('fontIncBtn').addEventListener('click', function() { cur = applySize(cur + 2); });
    document.getElementById('fontDecBtn').addEventListener('click', function() { cur = applySize(cur - 2); });
  });
})();
</script>

<script>
(function() {
  var handle = document.getElementById('chatResizeHandle');
  var panel  = document.getElementById('chatPanel');
  var dragging = false, startY = 0, startH = 0;
  handle.addEventListener('mousedown', function(e) {
    if (panel.classList.contains('collapsed')) return;
    dragging = true;
    startY = e.clientY;
    startH = panel.offsetHeight;
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var delta = startY - e.clientY;
    var newH = Math.min(Math.max(startH + delta, 80), window.innerHeight * 0.8);
    panel.style.height = newH + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (dragging) { dragging = false; document.body.style.userSelect = ''; }
  });
  // 触屏支持
  handle.addEventListener('touchstart', function(e) {
    if (panel.classList.contains('collapsed')) return;
    dragging = true;
    startY = e.touches[0].clientY;
    startH = panel.offsetHeight;
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    var delta = startY - e.touches[0].clientY;
    var newH = Math.min(Math.max(startH + delta, 80), window.innerHeight * 0.8);
    panel.style.height = newH + 'px';
  }, { passive: false });
  document.addEventListener('touchend', function() { dragging = false; });
})();
</script>

<script>
var _authTab = 'login';

function switchTab(tab) {
  _authTab = tab;
  document.getElementById('authTitle').textContent = tab === 'login' ? '登录草莓软酱' : '注册账号';
  document.getElementById('authSubmitBtn').textContent = tab === 'login' ? '登录' : '注册';
  document.getElementById('tabLogin').style.background = tab === 'login' ? '#f08ca8' : '#fff5f8';
  document.getElementById('tabLogin').style.color = tab === 'login' ? '#fff' : '#e8607a';
  document.getElementById('tabRegister').style.background = tab === 'register' ? '#f08ca8' : '#fff5f8';
  document.getElementById('tabRegister').style.color = tab === 'register' ? '#fff' : '#e8607a';
  document.getElementById('authError').textContent = '';
}

async function submitAuth() {
  var username = document.getElementById('authUsername').value.trim();
  var password = document.getElementById('authPassword').value;
  var errEl = document.getElementById('authError');
  var btn = document.getElementById('authSubmitBtn');
  if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }
  btn.disabled = true;
  btn.textContent = '请稍候...';
  try {
    var url = AUTH_API + '/' + (_authTab === 'login' ? 'login' : 'register');
    var res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    });
    var data = await res.json();
    if (!res.ok) { errEl.textContent = data.detail || '操作失败'; btn.disabled = false; btn.textContent = _authTab === 'login' ? '登录' : '注册'; return; }
    if (_authTab === 'register') {
      errEl.style.color = '#4caf50';
      errEl.textContent = '注册成功，请登录';
      errEl.style.color = '#e8607a';
      switchTab('login');
      btn.disabled = false; btn.textContent = '登录';
      return;
    }
    // 登录成功
    localStorage.setItem('sb_token', data.token);
    localStorage.setItem('sb_username', data.username);
    await loadUserAndStart(data.token, data.username);
  } catch(e) {
    errEl.textContent = '网络错误，请重试';
    btn.disabled = false;
    btn.textContent = _authTab === 'login' ? '登录' : '注册';
  }
}

async function loadUserAndStart(token, username) {
  try {
    var res = await fetch(AUTH_API + '/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) { localStorage.removeItem('sb_token'); showAuthModal(); return; }
    var data = await res.json();
    currentUser = { username: username, token: token, summary: data.summary || '' };
    // 恢复历史消息
    if (data.recent_messages && data.recent_messages.length > 0) {
      chatHistory = data.recent_messages;
    }
    document.getElementById('authModal').style.display = 'none';
    document.getElementById('usernameTag').textContent = username;
    document.getElementById('logoutBtn').style.display = '';
    // 更新打招呼语
    var greeting = data.summary
      ? '欢迎回来，' + username + '。上次聊到哪了，继续？'
      : '草莓软酱在线。股票、基金、期货、外汇都可以问，有什么想聊的？';
    var msgs = document.getElementById('chatMessages');
    msgs.innerHTML = '';
    appendChatMessage('ai', greeting);
  } catch(e) {
    showAuthModal();
  }
}

function showAuthModal() {
  document.getElementById('authModal').style.display = 'flex';
}

async function saveChat(messages) {
  if (!currentUser) return;
  try {
    await fetch(AUTH_API + '/save_history', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + currentUser.token
      },
      body: JSON.stringify({ messages: messages, summary: '' })
    });
  } catch(e) {}
}

document.getElementById('logoutBtn').addEventListener('click', async function() {
  if (!currentUser) return;
  await fetch(AUTH_API + '/logout', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + currentUser.token }
  }).catch(()=>{});
  localStorage.removeItem('sb_token');
  localStorage.removeItem('sb_username');
  currentUser = null;
  chatHistory = [];
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('usernameTag').textContent = '';
  document.getElementById('logoutBtn').style.display = 'none';
  showAuthModal();
});

// 回车提交登录
document.getElementById('authPassword').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitAuth();
});

// 自动登录
(async function() {
  var token = localStorage.getItem('sb_token');
  var username = localStorage.getItem('sb_username');
  if (token && username) {
    await loadUserAndStart(token, username);
  }
})();
</script>
